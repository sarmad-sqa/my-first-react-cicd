name: React CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Global environment variable jo poori pipeline ko control karega
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Ye section permissions ka masla hal karega
permissions:
  contents: write

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Dependencies
      run: npm install
      
    - name: Run Tests
      run: npm test -- --watchAll=false

    - name: Build Project
      run: npm run build

    - name: Deploy 🚀
      uses: JamesIves/github-pages-deploy-action@v4
      with:
          folder: build
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}